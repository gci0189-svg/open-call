<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATM 保養工單查詢</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --teal:#17c4a4;--teal-light:#d0f2ec;--teal-bg:#f0faf8;--teal-border:#b0e6dc;
  --mono:'Courier New',monospace;
}
body{background:#fff;color:#1a2a28;font-family:-apple-system,'PingFang TC','Microsoft JhengHei',sans-serif;font-size:17px;padding:22px 18px;min-height:100vh}
.page-title{font-size:13px;font-weight:500;color:var(--teal);letter-spacing:0.14em;text-transform:uppercase;margin-bottom:3px}
.page-sub{font-size:25px;font-weight:500;color:#0d1f1c;margin-bottom:22px;letter-spacing:0.01em}
.section-label{font-size:13px;font-weight:500;letter-spacing:0.1em;color:#88aaa6;text-transform:uppercase;margin-bottom:7px}

/* Single search */
.single-wrap{margin-bottom:16px}
.search-box{display:flex;align-items:center;border:1.5px solid var(--teal-border);border-radius:8px;overflow:hidden;background:#fff;transition:border-color 0.15s}
.search-box:focus-within{border-color:var(--teal)}
.s-icon{width:52px;height:52px;background:var(--teal);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer}
.s-icon svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.s-input{flex:1;height:52px;padding:0 16px;font-size:17px;font-family:var(--mono);color:#0d1f1c;letter-spacing:0.05em;border:none;outline:none;background:transparent}
.s-input::placeholder{color:#aac4c0;font-family:-apple-system,sans-serif;letter-spacing:0;font-size:16px}

/* Batch search */
.batch-wrap{margin-bottom:16px}
.multi-box{border:1.5px solid var(--teal-border);border-radius:8px;overflow:hidden;background:#fff;transition:border-color 0.15s}
.multi-box:focus-within{border-color:var(--teal)}
.multi-header{display:flex;align-items:center;gap:10px;padding:0 14px;height:46px;background:var(--teal-bg);border-bottom:1px solid var(--teal-light)}
.multi-header svg{width:16px;height:16px;stroke:var(--teal);fill:none;stroke-width:2;stroke-linecap:round;flex-shrink:0}
.multi-header span{font-size:14px;color:#50a090;letter-spacing:0.04em}
.batch-count{margin-left:auto;background:var(--teal);color:#fff;font-size:12px;font-weight:600;letter-spacing:0.06em;padding:3px 12px;border-radius:20px;min-width:36px;text-align:center}
.multi-textarea{width:100%;min-height:100px;border:none;outline:none;padding:10px 14px;font-family:var(--mono);font-size:16px;color:#0d1f1c;letter-spacing:0.05em;resize:vertical;background:transparent;line-height:1.8}
.multi-textarea::placeholder{color:#aac4c0;font-family:-apple-system,sans-serif;letter-spacing:0;font-size:15px}

/* Bank filters */
.bank-filters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.bf{height:36px;padding:0 14px;border:1.5px solid var(--teal-border);border-radius:20px;font-size:13px;font-weight:500;color:#20b09a;letter-spacing:0.06em;display:flex;align-items:center;gap:4px;background:#fff;cursor:pointer;transition:all 0.15s}
.bf:hover{border-color:var(--teal);color:var(--teal)}
.bf.active{border-color:var(--teal);background:var(--teal);color:#fff}
.bf .n{font-size:12px;opacity:0.7}

/* Result bar */
.result-bar{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding:0 2px;min-height:22px}
.result-bar .rt{font-size:14px;color:#88aaa6}
.result-bar .hit{color:var(--teal);font-weight:500}
.r-sep{flex:1;height:1px;background:var(--teal-light)}
.batch-hit{font-size:13px;color:var(--teal);letter-spacing:0.06em;background:var(--teal-bg);border:1px solid var(--teal-border);border-radius:20px;padding:2px 10px}

/* Cards */
.card{border:1.5px solid #d8eeea;border-radius:12px;padding:16px 18px;margin-bottom:10px;background:#fff;cursor:pointer;transition:border-color 0.15s}
.card:hover{border-color:var(--teal)}
.card.selected{border-color:var(--teal);border-left:4px solid var(--teal)}
.card-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:7px}
.bpill{border:1.5px solid var(--teal);border-radius:20px;font-size:12px;font-weight:700;letter-spacing:0.1em;color:var(--teal);padding:2px 9px;flex-shrink:0}
.cid{font-family:var(--mono);font-size:21px;font-weight:700;color:#0d1f1c;letter-spacing:0.08em}
.cserial{font-family:var(--mono);font-size:14px;color:#99bbb8}
.ctags{display:flex;gap:4px;margin-left:auto;flex-wrap:wrap;justify-content:flex-end}
.ctag{font-size:12px;padding:3px 10px;border-radius:20px;font-weight:500;border:1px solid;white-space:nowrap}
.ctag.bl{border-color:#c5b8f0;color:#7060c0}
.ctag.co{border-color:var(--teal-border);color:#17a08a}
.ctag.cf{border-color:#a8d8a8;color:#3a803a}
.ctag.pb{border-color:#f0c090;color:#b07020}
.cmodel{font-size:14px;color:var(--teal);font-family:var(--mono);letter-spacing:0.03em;margin-bottom:5px}
.divline{height:1px;background:#edf8f5;margin:5px 0}
.caddr{font-size:15px;color:#5a8a84;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cbr{color:#aac8c4;margin-right:4px}
.empty-state{text-align:center;color:#aac4c0;padding:40px 20px;font-size:16px;line-height:2}

/* Detail panel */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.25);z-index:99;opacity:0;pointer-events:none;transition:opacity 0.3s}
.overlay.show{opacity:1;pointer-events:auto}
.detail-panel{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:2px solid var(--teal);border-radius:16px 16px 0 0;padding:16px;max-height:78vh;overflow-y:auto;transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);z-index:100}
.detail-panel.open{transform:translateY(0)}
.drag-handle{width:36px;height:4px;background:var(--teal-border);border-radius:2px;margin:0 auto 14px}
.d-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.d-bank{font-size:13px;color:var(--teal);font-weight:600;letter-spacing:0.08em;margin-bottom:2px}
.d-id{font-family:var(--mono);font-size:26px;font-weight:700;letter-spacing:0.07em;color:#0d1f1c}
.d-serial{font-family:var(--mono);font-size:14px;color:#99bbb8;margin-top:1px}
.d-model{font-size:15px;color:var(--teal);font-family:var(--mono);margin:6px 0 4px}
.d-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.close-btn{margin-left:auto;background:none;border:1.5px solid var(--teal-border);border-radius:50%;width:28px;height:28px;color:#88aaa6;cursor:pointer;font-size:16px;line-height:1;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.close-btn:hover{border-color:var(--teal);color:var(--teal)}
.d-addr{color:#5a8a84;font-size:16px;margin-bottom:14px;line-height:1.6}
.sec-label{font-size:13px;font-weight:600;letter-spacing:0.12em;color:#88aaa6;text-transform:uppercase;margin-bottom:8px}
.text-box{background:var(--teal-bg);border:1.5px solid var(--teal-border);border-radius:10px;padding:16px;font-family:var(--mono);font-size:17px;line-height:1.9;color:#0d1f1c;white-space:pre-wrap;word-break:break-word;margin-bottom:10px}
.copy-btn{width:100%;background:var(--teal);border:none;border-radius:8px;color:#fff;font-size:17px;font-weight:600;padding:16px;cursor:pointer;transition:opacity 0.15s;letter-spacing:0.03em}
.copy-btn:hover{opacity:0.9}
.copy-btn:active{opacity:0.75}
.copy-btn.copied{background:#0d9e84}
/* Ticket mode */
.ticket-btn{width:100%;margin-top:8px;background:none;border:1.5px solid var(--teal-border);border-radius:10px;color:var(--teal);font-size:15px;font-weight:500;padding:13px;cursor:pointer;transition:all 0.15s}
.ticket-btn:hover{background:var(--teal-bg)}
.ticket-section{margin-top:14px;border-top:1px solid var(--teal-light);padding-top:14px}
.ticket-sec-label{font-size:12px;font-weight:600;letter-spacing:0.1em;color:#88aaa6;text-transform:uppercase;margin-bottom:10px}
.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.type-btn{border:1.5px solid var(--teal-border);border-radius:10px;padding:10px 8px;background:#fff;cursor:pointer;text-align:center;transition:all 0.15s}
.type-btn:hover{border-color:var(--teal)}
.type-btn.selected{border-color:var(--teal);background:var(--teal);color:#fff}
.type-btn .tb-type{font-size:15px;font-weight:700;font-family:monospace;letter-spacing:0.05em;display:block}
.type-btn .tb-desc{font-size:11px;opacity:0.75;margin-top:2px;display:block}
.type-btn.selected .tb-desc{opacity:0.85}
.work-input{width:100%;border:1.5px solid var(--teal-border);border-radius:10px;padding:12px 14px;font-size:15px;font-family:-apple-system,'PingFang TC',sans-serif;color:#0d1f1c;line-height:1.6;resize:none;outline:none;background:#fff;margin-bottom:10px}
.work-input:focus{border-color:var(--teal)}
.work-suggestions{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.work-sug{font-size:13px;padding:5px 12px;border:1.5px solid var(--teal-border);border-radius:20px;background:#fff;color:var(--teal);cursor:pointer;white-space:nowrap}
.work-sug:hover{background:var(--teal-bg)}
.ticket-preview{background:#f5f5f5;border:1.5px solid #ddd;border-radius:10px;padding:14px;font-size:14px;line-height:1.9;color:#0d1f1c;white-space:pre-wrap;word-break:break-word;margin-bottom:10px;font-family:monospace}
.copy-ticket-btn{width:100%;background:#2a6049;border:none;border-radius:10px;color:#fff;font-size:16px;font-weight:600;padding:15px;cursor:pointer;transition:opacity 0.15s;margin-bottom:6px}
.copy-ticket-btn:hover{opacity:0.9}
.copy-ticket-btn.copied{background:#0d9e84}
.add-ticket-btn{width:100%;background:none;border:1.5px solid #2a6049;border-radius:10px;color:#2a6049;font-size:14px;font-weight:500;padding:12px;cursor:pointer;transition:all 0.15s}
.add-ticket-btn:hover{background:#f0faf8}
.ticket-queue{margin-bottom:12px}
.tq-item{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#f0faf8;border:1px solid var(--teal-border);border-radius:8px;margin-bottom:6px;font-size:13px}
.tq-type{font-weight:700;font-family:monospace;color:var(--teal);flex-shrink:0}
.tq-text{color:#0d1f1c;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tq-del{background:none;border:none;color:#aac4c0;font-size:18px;cursor:pointer;flex-shrink:0;padding:0 2px}
.tq-del:hover{color:#e04040}
.copy-all-btn{width:100%;background:var(--teal);border:none;border-radius:10px;color:#fff;font-size:16px;font-weight:600;padding:15px;cursor:pointer;transition:opacity 0.15s}
.copy-all-btn:hover{opacity:0.9}
.copy-all-btn.copied{background:#0d9e84}
/* Batch open button on main screen */
.batch-open-btn{width:100%;background:var(--teal);border:none;border-radius:10px;color:#fff;font-size:16px;font-weight:500;padding:14px;cursor:pointer;transition:opacity .15s}
.batch-open-btn:hover{opacity:.9}
/* Batch panel */
.batch-panel{position:fixed;bottom:0;left:0;right:0;background:var(--color-background-primary,#fff);border-top:2px solid var(--teal);border-radius:16px 16px 0 0;padding:16px;max-height:85vh;overflow-y:auto;transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);z-index:100}
.batch-panel.open{transform:translateY(0)}
.bp-title{font-size:18px;font-weight:500;color:var(--color-text-primary);margin-bottom:14px}
.bp-sec-label{font-size:12px;font-weight:500;letter-spacing:.08em;color:#88aaa6;text-transform:uppercase;margin-bottom:10px;margin-top:4px}
/* Machine checkboxes */
.mc-row{display:flex;align-items:center;gap:10px;padding:11px 13px;border:1.5px solid var(--color-border-tertiary,#e0e0e0);border-radius:10px;margin-bottom:8px;cursor:pointer;background:var(--color-background-primary,#fff);transition:border-color .15s}
.mc-row.checked{border-color:var(--teal);background:var(--teal-bg)}
.mc-row:hover{border-color:var(--teal-border)}
.mc-chk{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--color-border-tertiary,#ccc);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;color:#fff;transition:all .15s}
.mc-row.checked .mc-chk{background:var(--teal);border-color:var(--teal)}
.mc-body{flex:1;min-width:0}
.mc-idline{display:flex;align-items:baseline;gap:6px}
.mc-id{font-family:monospace;font-size:16px;font-weight:500;color:var(--color-text-primary)}
.mc-ser{font-family:monospace;font-size:12px;color:#99bbb8}
.mc-mod{font-size:12px;color:var(--teal);margin-top:2px}
/* Actions */
.bp-actions{margin-top:14px;padding-top:4px}
.bp-add-btn{width:100%;background:var(--teal);border:none;border-radius:10px;color:#fff;font-size:16px;font-weight:500;padding:15px;cursor:pointer;margin-bottom:8px;transition:opacity .15s}
.bp-add-btn:hover{opacity:.9}
.bp-add-btn:disabled{background:#b0e6dc;color:#6abfb0;cursor:default}
.bp-cancel-btn{width:100%;background:none;border:1.5px solid var(--teal-border);border-radius:10px;color:#50a090;font-size:15px;padding:13px;cursor:pointer}
/* Select-all row */
.mc-selall{display:flex;align-items:center;gap:8px;padding:6px 2px 10px;cursor:pointer;font-size:13px;color:#50a090}
.mc-selall-chk{width:20px;height:20px;border-radius:5px;border:1.5px solid var(--teal-border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:#fff;flex-shrink:0}
.mc-selall.all .mc-selall-chk{background:var(--teal);border-color:var(--teal)}

/* Main queue bar */
.qb-wrap{background:var(--teal-bg);border:1.5px solid var(--teal-border);border-radius:12px;padding:12px 14px;margin-bottom:14px}
.qb-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.qb-title{font-size:12px;font-weight:500;letter-spacing:.08em;color:#50a090;text-transform:uppercase;flex:1}
.qb-badge{background:var(--teal);color:#fff;font-size:11px;font-weight:600;padding:2px 10px;border-radius:20px}
.qb-clear{font-size:12px;color:#aac4c0;background:none;border:none;cursor:pointer;padding:0}
.qb-clear:hover{color:#e04040}
.qi{display:flex;align-items:center;gap:8px;padding:8px 10px;background:#fff;border:1px solid var(--teal-border);border-radius:8px;margin-bottom:6px}
.qi-type{font-weight:700;font-family:var(--mono);font-size:13px;color:var(--teal);flex-shrink:0;min-width:34px}
.qi-serial{font-family:var(--mono);font-size:12px;color:#99bbb8;flex-shrink:0}
.qi-work{font-size:13px;color:#0d1f1c;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-left:4px}
.qi-del{background:none;border:none;color:#aac4c0;font-size:20px;cursor:pointer;flex-shrink:0;line-height:1;padding:0}
.qi-del:hover{color:#e04040}
.copy-all-main{width:100%;background:var(--teal);border:none;border-radius:9px;color:#fff;font-size:15px;font-weight:500;padding:13px;cursor:pointer;margin-top:4px;transition:opacity .15s}
.copy-all-main:hover{opacity:.9}
.copy-all-main.copied{background:#0d9e84}
/* Added badge on cards */
.added-badge{margin-left:auto;background:var(--teal-bg);border:1.5px solid var(--teal-border);border-radius:20px;font-size:11px;font-weight:500;color:var(--teal);padding:3px 10px;white-space:nowrap;flex-shrink:0}


/* Notice blocks */
.notice-wrap{margin-bottom:12px}
.nb{border-radius:10px;overflow:hidden;margin-bottom:8px}
.nb-head{display:flex;align-items:center;gap:8px;padding:9px 14px}
.nb-icon{font-size:14px;flex-shrink:0}
.nb-title{font-size:13px;font-weight:500;flex:1}
.nb-items{padding:2px 14px 10px}
.nb-item{display:flex;gap:8px;padding:5px 0;border-top:0.5px solid rgba(0,0,0,.06);font-size:13px;line-height:1.55}
.nb-item:first-child{border-top:none}
.nb-dot{flex-shrink:0;margin-top:5px;width:6px;height:6px;border-radius:50%}
.nb-text{color:var(--color-text-primary, #1a2a28);word-break:break-word}
.nb-edit-btn{font-size:12px;background:none;border:1px solid;border-radius:6px;padding:3px 10px;cursor:pointer;flex-shrink:0;margin-left:auto}
.nb-red{border:1.5px solid #f0a0a0}
.nb-red .nb-head{background:#fff0f0}
.nb-red .nb-title{color:#8a2020}
.nb-red .nb-dot{background:#e04040}
.nb-yellow{border:1.5px solid #f0d060}
.nb-yellow .nb-head{background:#fffbe6}
.nb-yellow .nb-title{color:#7a5c00}
.nb-yellow .nb-dot{background:#e6a800}
.nb-teal{border:1.5px solid var(--teal-border)}
.nb-teal .nb-head{background:var(--teal-bg)}
.nb-teal .nb-title{color:#0d6e5c}
.nb-teal .nb-dot{background:var(--teal)}
.nb-teal .nb-edit-btn{border-color:var(--teal-border);color:#17c4a4}
.notice-add-btn{font-size:13px;color:#17c4a4;background:none;border:1.5px solid var(--teal-border);border-radius:8px;padding:8px 14px;cursor:pointer;width:100%;text-align:left;margin-bottom:8px}
.notice-add-btn:hover{background:var(--teal-bg)}
/* Notice editor modal */
.notice-modal{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.notice-modal-box{background:#fff;border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:640px}
.notice-modal-title{font-size:16px;font-weight:600;color:#0d1f1c;margin-bottom:4px}
.notice-modal-sub{font-size:13px;color:#88aaa6;margin-bottom:14px}
.notice-modal-ta{width:100%;border:1.5px solid var(--teal-border);border-radius:10px;padding:12px 14px;font-size:16px;font-family:-apple-system,"PingFang TC",sans-serif;color:#0d1f1c;line-height:1.7;resize:vertical;min-height:120px;outline:none}
.notice-modal-ta:focus{border-color:var(--teal)}
.notice-modal-btns{display:flex;gap:10px;margin-top:12px}
.notice-modal-save{flex:1;background:var(--teal);border:none;border-radius:10px;color:#fff;font-size:16px;font-weight:600;padding:14px;cursor:pointer}
.notice-modal-del{background:none;border:1.5px solid #e0a0a0;border-radius:10px;color:#c04040;font-size:15px;font-weight:500;padding:14px 18px;cursor:pointer}
.notice-modal-cancel{background:none;border:1.5px solid var(--teal-border);border-radius:10px;color:#50a090;font-size:15px;padding:14px 18px;cursor:pointer}

</style>
</head>
<body>

<div class="page-title">ATM 保養工單查詢</div>
<div class="page-sub">Machine Query</div>

<div class="single-wrap">
  <div class="section-label">單筆查詢</div>
  <div class="search-box">
    <div class="s-icon" onclick="doSearch()">
      <svg viewBox="0 0 16 16"><circle cx="6.5" cy="6.5" r="4"/><line x1="10" y1="10" x2="14" y2="14"/></svg>
    </div>
    <input type="text" class="s-input" id="searchInput" placeholder="輸入 ATM ID、序號、地址、分行名稱…" autocomplete="off" spellcheck="false">
  </div>
</div>

<div class="batch-wrap">
  <div class="section-label">批次查詢（最多 10 筆）</div>
  <div class="multi-box">
    <div class="multi-header">
      <svg viewBox="0 0 16 16"><rect x="2" y="3" width="12" height="2" rx="1"/><rect x="2" y="7" width="9" height="2" rx="1"/><rect x="2" y="11" width="11" height="2" rx="1"/></svg>
      <span>每行一筆 ATM ID 或序號</span>
      <div class="batch-count" id="batchCount">0 / 10</div>
    </div>
    <textarea class="multi-textarea" id="batchInput" placeholder="0VFNZ&#10;56HGL01086&#10;過港路&#10;08653&#10;…"></textarea>
  </div>
</div>

<div class="bank-filters" id="bankFilters"></div>
<div id="queueBar" style="display:none">
  <div class="qb-wrap">
    <div class="qb-header">
      <span class="qb-title">批次工單</span>
      <span class="qb-badge" id="qbBadge">0 張</span>
      <button class="qb-clear" onclick="clearQueue()">清除全部</button>
    </div>
    <div id="qbItems"></div>
    <button class="copy-all-main" id="copyAllMainBtn" onclick="copyAllMain()">複製全部工單</button>
  </div>
</div>
<div style="margin-bottom:10px" id="batchOpenWrap" style="display:none">
  <button class="batch-open-btn" id="batchOpenBtn" onclick="openBatchPanel()">📋 開電子工單</button>
</div>
<div class="result-bar" id="resultBar"></div>
<div id="resultList"></div>

<!-- Batch select panel (bottom sheet) -->

let singleQuery = '';
let activeBank = '';
window._filteredMatches = [];

const searchInput = document.getElementById('searchInput');
const batchInput = document.getElementById('batchInput');
const bankFilters = document.getElementById('bankFilters');
const resultList = document.getElementById('resultList');
const resultBar = document.getElementById('resultBar');
const batchCount = document.getElementById('batchCount');
const detailPanel = document.getElementById('detailPanel');
const overlay = document.getElementById('overlay');

const bankCounts = {};
DATA.forEach(m => { bankCounts[m.b] = (bankCounts[m.b] || 0) + 1; });
const banks = [...new Set(DATA.map(m => m.b))].sort((a,b) => bankCounts[b] - bankCounts[a]);
banks.forEach(b => {
  const btn = document.createElement('button');
  btn.className = 'bf';
  btn.dataset.bank = b;
  const name = (BANK_NAMES[b] || b);
  btn.innerHTML = name + ' ' + b + ' <span class="n">' + bankCounts[b] + '</span>';
  btn.onclick = () => toggleBank(b);
  bankFilters.appendChild(btn);
});

function toggleBank(b) {
  activeBank = activeBank === b ? '' : b;
  document.querySelectorAll('.bf').forEach(btn => btn.classList.toggle('active', btn.dataset.bank === activeBank));
  render();
}

searchInput.addEventListener('input', e => {
  singleQuery = e.target.value.trim();
  if (singleQuery) { batchInput.value = ''; updateBatchCount(); }
  render();
});

batchInput.addEventListener('input', () => {
  updateBatchCount();
  if (batchInput.value.trim()) { searchInput.value = ''; singleQuery = ''; }
  render();
});

function updateBatchCount() {
  const lines = getBatchLines();
  batchCount.textContent = lines.length + ' / 10';
}

function getBatchLines() {
  return batchInput.value.split('\n')
    .map(l => l.trim().replace(/\s/g,''))
    .filter(l => l.length > 0)
    .slice(0, 10);
}

function doSearch() { render(); searchInput.focus(); }

function renderCards() {
  return render();
}
function render() {
  const isBatch = batchInput.value.trim().length > 0;
  const rawLines = isBatch ? getBatchLines() : (singleQuery ? [singleQuery.toLowerCase()] : []);
  const show = rawLines.length > 0 || activeBank;

  if (!show) {
    resultBar.innerHTML = '<span class="rt">共 ' + DATA.length + ' 台機器 · 輸入機號或選擇銀行開始查詢</span>';
    resultList.innerHTML = '';
    const bw0 = document.getElementById('batchOpenWrap'); if(bw0) bw0.style.display='none';
    return;
  }

  const queries = rawLines.map(l => l.toLowerCase());
  const matches = DATA.filter(m => {
    if (activeBank && m.b !== activeBank) return false;
    if (!queries.length) return !!activeBank;
    const id = m.id.toLowerCase().replace(/\s/g,'');
    const s = m.s.toLowerCase().replace(/\s/g,'');
    const br = m.br.toLowerCase();
    const a = m.a.toLowerCase();
    return queries.some(q => id.includes(q) || s.includes(q) || br.includes(q) || a.includes(q));
  });

  window._filteredMatches = matches;

  if (isBatch && queries.length > 0) {
    const hitCount = queries.filter(q => matches.some(m => {
      const id = m.id.toLowerCase().replace(/\s/g,'');
      const s = m.s.toLowerCase().replace(/\s/g,'');
      const br = m.br.toLowerCase();
      const a = m.a.toLowerCase();
      return id.includes(q) || s.includes(q) || br.includes(q) || a.includes(q);
    })).length;
    resultBar.innerHTML = '<span class="rt">找到 <span class="hit">' + matches.length + '</span> 台</span><div class="r-sep"></div><span class="batch-hit">批次 ' + hitCount + ' / ' + queries.length + ' 筆命中</span>';
  } else {
    resultBar.innerHTML = '<span class="rt">找到 <span class="hit">' + matches.length + '</span> 台</span>';
  }

  if (matches.length === 0) {
    resultList.innerHTML = '<div class="empty-state">查無機台<br>請確認 ATM ID、序號或地址</div>';
    const bw = document.getElementById('batchOpenWrap'); if(bw) bw.style.display='none';
    return;
  }

  const limit = 50;
  const items = matches.slice(0, limit);
  resultList.innerHTML = items.map((m, i) => {
    const tags = [];
    if (m.bl) tags.push('<span class="ctag bl">盲胞</span>');
    if (m.co) tags.push('<span class="ctag co">零錢機</span>');
    if (m.cf) tags.push('<span class="ctag cf">家樂福</span>');
    if (m.pb) tags.push('<span class="ctag pb">補摺</span>');
    const inQueue = _ticketQueue.some(q => q.serial === m.s);
    return '<div class="card' + (inQueue ? ' selected' : '') + '" onclick="showDetail(' + i + ')">' +
      '<div class="card-top">' +
        '<span class="bpill">' + m.b + '</span>' +
        '<span class="cid">' + m.id + '</span>' +
        '<span class="cserial">' + m.s + '</span>' +
        '<div class="ctags">' + tags.join('') + '</div>' +
      '</div>' +
      '<div class="cmodel">' + m.mo + '</div>' +
      '<div class="divline"></div>' +
      '<div class="caddr"><span class="cbr">' + m.br + ' ·</span>' + m.a + '</div>' +
    '</div>';
  }).join('');

  if (matches.length > limit) {
    resultList.innerHTML += '<div class="empty-state" style="padding:16px">還有 ' + (matches.length - limit) + ' 台，請縮小搜尋範圍</div>';
  }
  const batchWrap = document.getElementById('batchOpenWrap');
  if (batchWrap) batchWrap.style.display = matches.length > 0 ? 'block' : 'none';
}

function getWorkText(m) {
  const bn = m.b.startsWith('BOT') ? 'BOT' : m.b.startsWith('COOP') ? 'COOP' : m.b;
  if (bn === 'BOT') return m.pb ? '定保\n\n存摺列印正常,並於' + m.id.trim() + '工作站補摺正常' : '定保';
  if (bn === 'COOP') return m.pb ? '定保\n\n補摺功能正常' : '定保';
  return m.wt;
}

function showDetail(idx) {
  const m = window._filteredMatches[idx];
  document.getElementById('d_bank').textContent = (BANK_NAMES[m.b] || m.b) + '  ' + m.b;
  document.getElementById('d_id').textContent = m.id;
  document.getElementById('d_serial').textContent = '序號 ' + m.s;
  document.getElementById('d_model').textContent = m.mo;
  document.getElementById('d_addr').textContent = m.br + '  ·  ' + m.a;
  document.getElementById('d_text').textContent = getWorkText(m);
  const tags = [];
  if (m.bl) tags.push('<span class="ctag bl">盲胞機</span>');
  if (m.co) tags.push('<span class="ctag co">配有零錢機</span>');
  if (m.cf) tags.push('<span class="ctag cf">家樂福</span>');
  if (m.pb) tags.push('<span class="ctag pb">補摺機</span>');
  document.getElementById('d_tags').innerHTML = tags.join('');
  const btn = document.getElementById('copyBtn');
  btn.textContent = '複製工單內容';
  btn.className = 'copy-btn';
  document.querySelectorAll('.card').forEach((c,i) => c.classList.toggle('selected', i === idx));
  _currentMachine = m;
  renderNotice(m.b);
  // Reset ticket section for new machine
  const ts = document.getElementById('ticketSection');
  if (ts) {
    ts.style.display = 'none';
    const tb = document.querySelector('.ticket-btn');
    if (tb) tb.textContent = '📋 開電子工單';
    _selectedType = null;
    _ticketQueue = [];
  }
  detailPanel.classList.add('open');
  overlay.classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeDetail() {
  detailPanel.classList.remove('open');
  overlay.classList.remove('show');
  document.body.style.overflow = '';
}

function copyText() {
  const text = document.getElementById('d_text').textContent;
  const btn = document.getElementById('copyBtn');
  function onSuccess() {
    btn.textContent = '✓ 已複製！';
    btn.className = 'copy-btn copied';
    setTimeout(() => { btn.textContent = '複製工單內容'; btn.className = 'copy-btn'; }, 2000);
  }
  function onFail() {
    btn.textContent = '✗ 複製失敗，請手動複製';
    btn.style.background = '#e04040';
    setTimeout(() => { btn.textContent = '複製工單內容'; btn.className = 'copy-btn'; btn.style.background = ''; }, 3000);
  }
  function fallback() {
    try {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;font-size:16px;';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      const ok = document.execCommand('copy');
      document.body.removeChild(ta);
      ok ? onSuccess() : onFail();
    } catch(e) { onFail(); }
  }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(onSuccess).catch(fallback);
  } else {
    fallback();
  }
}

// ── Notice system ──
let _currentBankForNotice = '';

function loadNotices() {
  try { return JSON.parse(localStorage.getItem('atm_notices') || '{}'); } catch(e) { return {}; }
}
function saveNotices(obj) {
  try { localStorage.setItem('atm_notices', JSON.stringify(obj)); } catch(e) {}
}

function renderNotice(bankCode) {
  _currentBankForNotice = bankCode;
  const userNotices = loadNotices();
  const userText = userNotices[bankCode] || '';
  const bankName = (BANK_NAMES[bankCode] || bankCode);
  const wrap = document.getElementById('noticeWrap');
  const bn = NOTICES[bankCode] || {must:[], remind:[]};
  let html = '';

  if (bn.must && bn.must.length) {
    html += '<div class="nb nb-red">' +
      '<div class="nb-head"><span class="nb-icon">🔴</span><span class="nb-title">必做 — 缺少將無法請款</span></div>' +
      '<div class="nb-items">' +
      bn.must.map(t => '<div class="nb-item"><div class="nb-dot"></div><div class="nb-text">' + t + '</div></div>').join('') +
      '</div></div>';
  }
  if (bn.remind && bn.remind.length) {
    html += '<div class="nb nb-yellow">' +
      '<div class="nb-head"><span class="nb-icon">⚠️</span><span class="nb-title">作業提醒</span></div>' +
      '<div class="nb-items">' +
      bn.remind.map(t => '<div class="nb-item"><div class="nb-dot"></div><div class="nb-text">' + t + '</div></div>').join('') +
      '</div></div>';
  }
  if (userText) {
    html += '<div class="nb nb-teal">' +
      '<div class="nb-head"><span class="nb-icon">📋</span><span class="nb-title">臨時專案注意事項</span>' +
      '<button class="nb-edit-btn" onclick="openNoticeEditor()">編輯</button></div>' +
      '<div class="nb-items"><div class="nb-item"><div class="nb-dot"></div>' +
      '<div class="nb-text">' + userText.replace(/</g,'&lt;').replace(/\n/g,'<br>') + '</div></div></div></div>';
  } else {
    html += '<button class="notice-add-btn" onclick="openNoticeEditor()">＋ 新增臨時專案注意事項（選填）</button>';
  }
  wrap.innerHTML = html;
}

function openNoticeEditor() {
  const notices = loadNotices();
  const text = notices[_currentBankForNotice] || '';
  const bankName = (BANK_NAMES[_currentBankForNotice] || _currentBankForNotice);
  const modal = document.createElement('div');
  modal.className = 'notice-modal';
  modal.id = 'noticeModal';
  modal.innerHTML =
    '<div class="notice-modal-box">' +
      '<div class="notice-modal-title">⚠️ ' + bankName + ' 保養注意事項</div>' +
      '<div class="notice-modal-sub">提醒自己定保時的額外任務，例如：需拍照、填 check list 等</div>' +
      '<textarea class="notice-modal-ta" id="noticeTa" placeholder="例：定保需拍紙本保養單及check list，並將2張照片附在電子工單內">' + text + '</textarea>' +
      '<div class="notice-modal-btns">' +
        '<button class="notice-modal-save" onclick="saveNotice()">儲存</button>' +
        (text ? '<button class="notice-modal-del" onclick="deleteNotice()">刪除</button>' : '') +
        '<button class="notice-modal-cancel" onclick="closeNoticeModal()">取消</button>' +
      '</div>' +
    '</div>';
  document.body.appendChild(modal);
  document.getElementById('noticeTa').focus();
}

function saveNotice() {
  const text = document.getElementById('noticeTa').value.trim();
  const notices = loadNotices();
  if (text) { notices[_currentBankForNotice] = text; }
  else { delete notices[_currentBankForNotice]; }
  saveNotices(notices);
  closeNoticeModal();
  renderNotice(_currentBankForNotice);
}

function deleteNotice() {
  const notices = loadNotices();
  delete notices[_currentBankForNotice];
  saveNotices(notices);
  closeNoticeModal();
  renderNotice(_currentBankForNotice);
}

function closeNoticeModal() {
  const m = document.getElementById('noticeModal');
  if (m) m.remove();
}


// ── Ticket system ──
const TICKET_TYPES = [
  {type:'O1C', desc:'定保', work:'定保', fixed:true},
  {type:'O7',  desc:'報價/預防性', work:'', fixed:false, suggestions:['預防性更換puller','預防性更換皮帶','預防性更換感應器']},
  {type:'O9C', desc:'合約外檢修', work:'', fixed:false, suggestions:['檢測吐鈔模組','檢測DVR','檢測吐鈔及發鈔模組','Site check']},
  {type:'SW',  desc:'軟體問題', work:'', fixed:false, suggestions:['重裝DMS','系統重灌','軟體異常']},
];

let _selectedType = null;
let _ticketQueue = [];
let _currentMachine = null;

function renderMainQueue() {
  const bar = document.getElementById('queueBar');
  const items = document.getElementById('qbItems');
  const badge = document.getElementById('qbBadge');
  const btn = document.getElementById('copyAllMainBtn');
  if (!_ticketQueue.length) { bar.style.display = 'none'; return; }
  bar.style.display = 'block';
  badge.textContent = _ticketQueue.length + ' 張';
  btn.textContent = '複製全部 ' + _ticketQueue.length + ' 張工單';
  btn.className = 'copy-all-main';
  items.innerHTML = _ticketQueue.map((q,i) =>
    '<div class="qi">' +
      '<span class="qi-type">' + q.type + '</span>' +
      '<span class="qi-serial">' + q.serial + '</span>' +
      '<span class="qi-work">' + q.work + '</span>' +
      '<button class="qi-del" onclick="removeFromQueue(' + i + ')">×</button>' +
    '</div>'
  ).join('');
  renderCards();
}

function clearQueue() {
  _ticketQueue = [];
  renderMainQueue();
  renderCards();
}

function removeFromQueue(i) {
  _ticketQueue.splice(i, 1);
  renderMainQueue();
}

function copyAllMain() {
  const text = _ticketQueue.map(q => q.text).join('\n\n---\n\n');
  const btn = document.getElementById('copyAllMainBtn');
  function onOk() { btn.textContent = '✓ 已複製全部 ' + _ticketQueue.length + ' 張！'; btn.className = 'copy-all-main copied'; setTimeout(() => { btn.textContent = '複製全部 ' + _ticketQueue.length + ' 張工單'; btn.className = 'copy-all-main'; }, 2500); }
  function onFail() { btn.textContent = '✗ 複製失敗'; setTimeout(() => { btn.textContent = '複製全部 ' + _ticketQueue.length + ' 張工單'; btn.className = 'copy-all-main'; }, 2000); }
  function fallback() { try { const ta=document.createElement('textarea'); ta.value=text; ta.style.cssText='position:fixed;top:0;left:0;opacity:0;font-size:16px;'; document.body.appendChild(ta); ta.focus(); ta.select(); const ok=document.execCommand('copy'); document.body.removeChild(ta); ok?onOk():onFail(); } catch(e){onFail();} }
  if (navigator.clipboard && navigator.clipboard.writeText) { navigator.clipboard.writeText(text).then(onOk).catch(fallback); } else { fallback(); }
}

function toggleTicketMode() {
  const sec = document.getElementById('ticketSection');
  const btn = document.querySelector('.ticket-btn');
  const isOpen = sec.style.display !== 'none';
  sec.style.display = isOpen ? 'none' : 'block';
  btn.textContent = isOpen ? '📋 開電子工單' : '✕ 關閉工單模式';
  if (!isOpen) { _selectedType = null; renderTypeGrid(); renderWorkArea(); renderInlineQueue(); }
}

function renderTypeGrid() {
  const grid = document.getElementById('typeGrid');
  if (!grid) return;
  grid.innerHTML = TICKET_TYPES.map((t,i) =>
    '<button class="type-btn' + (_selectedType === i ? ' selected' : '') + '" onclick="selectType(' + i + ')">' +
      '<span class="tb-type">' + t.type + '</span>' +
      '<span class="tb-desc">' + t.desc + '</span>' +
    '</button>'
  ).join('');
}

function selectType(i) {
  _selectedType = i;
  renderTypeGrid();
  renderWorkArea();
}

function renderWorkArea() {
  const area = document.getElementById('workArea');
  if (!area) return;
  if (_selectedType === null) { area.innerHTML = ''; updatePreview(''); return; }
  const t = TICKET_TYPES[_selectedType];
  if (t.fixed) {
    area.innerHTML = '';
    updatePreview(t.work);
  } else {
    area.innerHTML =
      (t.suggestions && t.suggestions.length ? '<div class="work-suggestions" id="sugBox"></div>' : '') +
      '<textarea class="work-input" id="workInput" rows="2" placeholder="\u8f38\u5165\u5de5\u4f5c\u5167\u5bb9\u2026" oninput="updatePreviewFromInput()"></textarea>';
    const sugBox = document.getElementById('sugBox');
    if (sugBox && t.suggestions) {
      t.suggestions.forEach(function(s) {
        const btn = document.createElement('button');
        btn.className = 'work-sug';
        btn.textContent = s;
        btn.onclick = function() { setSuggestion(s); };
        sugBox.appendChild(btn);
      });
    }
    updatePreview('');
  }
}

function setSuggestion(text) {
  const ta = document.getElementById('workInput');
  if (ta) { ta.value = text; updatePreview(text); ta.focus(); }
}

function updatePreviewFromInput() {
  const ta = document.getElementById('workInput');
  if (ta) updatePreview(ta.value.trim());
}

function getCurrentWork() {
  if (_selectedType === null) return '';
  const t = TICKET_TYPES[_selectedType];
  if (t.fixed) return t.work;
  const ta = document.getElementById('workInput');
  return ta ? ta.value.trim() : '';
}

function getTicketText(m, type, work) {
  const bankName = BANK_NAMES[m.b] || m.b;
  return '麻煩協助建\n' + bankName + m.br + '\n' + m.s + '\n' + type + '\n' + work + '\nSteven Chou';
}

function updatePreview(workText) {
  if (!_currentMachine || _selectedType === null) {
    document.getElementById('ticketPreview').style.display = 'none';
    document.getElementById('previewLabel').style.display = 'none';
    document.getElementById('ticketActions').innerHTML = '';
    return;
  }
  const t = TICKET_TYPES[_selectedType];
  const work = workText !== undefined ? workText : getCurrentWork();
  if (!work) {
    document.getElementById('ticketPreview').style.display = 'none';
    document.getElementById('previewLabel').style.display = 'none';
    document.getElementById('ticketActions').innerHTML = '';
    return;
  }
  const text = getTicketText(_currentMachine, t.type, work);
  const preview = document.getElementById('ticketPreview');
  preview.textContent = text;
  preview.style.display = 'block';
  document.getElementById('previewLabel').style.display = 'block';
  const alreadyIn = _ticketQueue.some(q => q.serial === _currentMachine.s && q.type === t.type);
  document.getElementById('ticketActions').innerHTML =
    '<button class="copy-ticket-btn" id="copyTicketBtn" onclick="copyTicket()">複製此工單</button>' +
    (alreadyIn ? '<div style="text-align:center;font-size:13px;color:var(--teal);padding:8px 0">✓ 已在批次清單中</div>' :
    '<button class="add-ticket-btn" onclick="addToQueue()">＋ 加入批次清單</button>');
}

function copyTicket() {
  if (!_currentMachine || _selectedType === null) return;
  const work = getCurrentWork();
  if (!work) return;
  const t = TICKET_TYPES[_selectedType];
  const text = getTicketText(_currentMachine, t.type, work);
  const btn = document.getElementById('copyTicketBtn');
  function onOk() { btn.textContent = '✓ 已複製！'; btn.className = 'copy-ticket-btn copied'; setTimeout(() => { btn.textContent = '複製此工單'; btn.className = 'copy-ticket-btn'; }, 2000); }
  function onFail() { btn.textContent = '✗ 複製失敗'; setTimeout(() => { btn.textContent = '複製此工單'; btn.className = 'copy-ticket-btn'; }, 2000); }
  function fallback() { try { const ta=document.createElement('textarea'); ta.value=text; ta.style.cssText='position:fixed;top:0;left:0;opacity:0;font-size:16px;'; document.body.appendChild(ta); ta.focus(); ta.select(); const ok=document.execCommand('copy'); document.body.removeChild(ta); ok?onOk():onFail(); } catch(e){onFail();} }
  if (navigator.clipboard && navigator.clipboard.writeText) { navigator.clipboard.writeText(text).then(onOk).catch(fallback); } else { fallback(); }
}

function addToQueue() {
  if (!_currentMachine || _selectedType === null) return;
  const work = getCurrentWork();
  if (!work) return;
  const t = TICKET_TYPES[_selectedType];
  const text = getTicketText(_currentMachine, t.type, work);
  _ticketQueue.push({ text, type: t.type, work, serial: _currentMachine.s });
  renderMainQueue();
  updatePreview(work);
}

function renderInlineQueue() {
  const el = document.getElementById('ticketQueue');
  if (!el) return;
  el.innerHTML = '';
}


// ── Batch panel ──
let _bpSelectedType = 0;
let _bpChecked = new Set();
let _bpMachines = [];

function openBatchPanel() {
  _bpMachines = (window._filteredMatches || []).slice(0, 20);
  if (!_bpMachines.length) return;
  _bpChecked = new Set(_bpMachines.map((_,i) => i));
  _bpSelectedType = 0;
  renderBpTypeGrid();
  renderBpWorkArea();
  renderBpMachines();
  const branch = _bpMachines[0].br || '';
  const bankName = BANK_NAMES[_bpMachines[0].b] || _bpMachines[0].b;
  document.getElementById('bpTitle').textContent = bankName + ' ' + branch;
  document.getElementById('batchPanel').classList.add('open');
  document.getElementById('batchOverlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeBatchPanel() {
  document.getElementById('batchPanel').classList.remove('open');
  document.getElementById('batchOverlay').classList.remove('show');
  document.body.style.overflow = '';
}

function renderBpTypeGrid() {
  const grid = document.getElementById('bpTypeGrid');
  grid.innerHTML = '';
  TICKET_TYPES.forEach(function(t, i) {
    const btn = document.createElement('button');
    btn.className = 'type-btn' + (_bpSelectedType === i ? ' selected' : '');
    btn.innerHTML = '<span class="tb-type">'+t.type+'</span><span class="tb-desc">'+t.desc+'</span>';
    btn.onclick = function() { _bpSelectedType = i; renderBpTypeGrid(); renderBpWorkArea(); renderBpAddBtn(); };
    grid.appendChild(btn);
  });
}

function renderBpWorkArea() {
  const area = document.getElementById('bpWorkArea');
  const t = TICKET_TYPES[_bpSelectedType];
  if (t.fixed) { area.innerHTML = ''; return; }
  area.innerHTML = '<div class="work-suggestions" id="bpSugBox"></div>' +
    '<textarea class="work-input" id="bpWorkInput" rows="2" placeholder="輸入工作內容…" oninput="renderBpAddBtn()"></textarea>';
  const sugBox = document.getElementById('bpSugBox');
  if (t.suggestions) {
    t.suggestions.forEach(function(s) {
      const btn = document.createElement('button');
      btn.className = 'work-sug';
      btn.textContent = s;
      btn.onclick = function() {
        document.getElementById('bpWorkInput').value = s;
        renderBpAddBtn();
      };
      sugBox.appendChild(btn);
    });
  }
}

function renderBpMachines() {
  const list = document.getElementById('bpMachineList');
  list.innerHTML = '';
  const label = document.getElementById('bpMachineLabel');
  label.textContent = '選擇機台（' + _bpMachines.length + ' 台）';

  const allRow = document.createElement('div');
  const allChecked = _bpChecked.size === _bpMachines.length;
  allRow.className = 'mc-selall' + (allChecked ? ' all' : '');
  allRow.innerHTML = '<div class="mc-selall-chk">'+(allChecked?'✓':'')+'</div><span>全選</span>';
  allRow.onclick = function() {
    if (_bpChecked.size === _bpMachines.length) { _bpChecked.clear(); } 
    else { _bpMachines.forEach((_,i) => _bpChecked.add(i)); }
    renderBpMachines(); renderBpAddBtn();
  };
  list.appendChild(allRow);

  _bpMachines.forEach(function(m, i) {
    const row = document.createElement('div');
    const chk = _bpChecked.has(i);
    row.className = 'mc-row' + (chk ? ' checked' : '');
    const tags = [];
    if (m.bl) tags.push('<span class="ctag bl">盲胞</span>');
    if (m.co) tags.push('<span class="ctag co">零錢機</span>');
    if (m.pb) tags.push('<span class="ctag pb">補折</span>');
    row.innerHTML =
      '<div class="mc-chk">'+(chk?'✓':'')+'</div>'+
      '<div class="mc-body">'+
        '<div class="mc-idline"><span class="mc-id">'+m.id+'</span><span class="mc-ser">'+m.s+'</span></div>'+
        '<div class="mc-mod">'+m.mo+'</div>'+
      '</div>'+
      (tags.length ? '<div style="display:flex;gap:4px;flex-shrink:0">'+tags.join('')+'</div>' : '');
    row.onclick = function() {
      if (_bpChecked.has(i)) { _bpChecked.delete(i); } else { _bpChecked.add(i); }
      renderBpMachines(); renderBpAddBtn();
    };
    list.appendChild(row);
  });
  renderBpAddBtn();
}

function getBpWork() {
  const t = TICKET_TYPES[_bpSelectedType];
  if (t.fixed) return t.work;
  const ta = document.getElementById('bpWorkInput');
  return ta ? ta.value.trim() : '';
}

function renderBpAddBtn() {
  const btn = document.getElementById('bpAddBtn');
  const n = _bpChecked.size;
  const work = getBpWork();
  if (n === 0 || !work) {
    btn.disabled = true;
    btn.textContent = n === 0 ? '請選擇機台' : '請輸入工作內容';
  } else {
    btn.disabled = false;
    btn.textContent = '加入批次 ' + n + ' 台';
  }
}

function batchAddToQueue() {
  const t = TICKET_TYPES[_bpSelectedType];
  const work = getBpWork();
  if (!work) return;
  _bpChecked.forEach(function(i) {
    const m = _bpMachines[i];
    if (!m) return;
    const already = _ticketQueue.some(function(q) { return q.serial === m.s && q.type === t.type; });
    if (already) return;
    const bankName = BANK_NAMES[m.b] || m.b;
    const text = '麻煩協助建
' + bankName + m.br + '
' + m.s + '
' + t.type + '
' + work + '
Steven Chou';
    _ticketQueue.push({ text: text, type: t.type, work: work, serial: m.s });
  });
  renderMainQueue();
  closeBatchPanel();
}

render();
searchInput.focus();
</script>
